name: Diagonal → TMDb Sync

on:
  schedule:
    - cron: "0 17 * * 4"  # Jeudi 18h Paris (heure d'été) / 18h hiver = "0 17 * * 4"
  workflow_dispatch:        # Lancement manuel depuis GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_LIST_ID: ${{ secrets.TMDB_LIST_ID }}
          TMDB_USERNAME: ${{ secrets.TMDB_USERNAME }}
          TMDB_PASSWORD: ${{ secrets.TMDB_PASSWORD }}
        run: python scraper.py
