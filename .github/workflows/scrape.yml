name: Diagonal → Trakt Sync

on:
  schedule:
    - cron: "0 17 * * 4"   # Jeudi 17h UTC = 18h Paris (heure d'été)
    # Si tu veux couvrir l'heure d'hiver aussi (UTC+1), utilise 17h UTC
  workflow_dispatch:         # Lancement manuel depuis GitHub si besoin

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
          TRAKT_USERNAME: ${{ secrets.TRAKT_USERNAME }}
          TRAKT_LIST_SLUG: ${{ secrets.TRAKT_LIST_SLUG }}
        run: python scraper.py
