name: Diagonal Trakt Scraper

on:
  schedule:
    # Tourne tous les jours à 8h00 UTC (9h ou 10h en France)
    - cron: '0 8 * * *'
  workflow_dispatch: # Permet aussi de lancer le script manuellement depuis GitHub !

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement du script
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
        run: python scraper.py # Change ce nom si ton script s'appelle autrement
