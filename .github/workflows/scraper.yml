name: Diagonal Trakt Scraper

on:
  schedule:
    - cron: '0 8 * * 4'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4  # ← v4

      - name: Configuration de Python
        uses: actions/setup-python@v5  # ← v5
        with:
          python-version: '3.10'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Installation de Playwright + Chromium
        run: python -m playwright install chromium --with-deps  # ← python -m playwright

      - name: Lancement du script
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_ACCESS_TOKEN: ${{ secrets.TRAKT_ACCESS_TOKEN }}
        run: python diagonal-scraper.py
